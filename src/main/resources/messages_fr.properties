info.terms.title=Conditions générales
info.terms.subtitle=Informations légales
info.terms.lead=Ces conditions décrivent l'utilisation des pages publiques de la plateforme, de l'accès agent et des demandes adressées aux concessionnaires.
info.terms.point1=Les annonces de véhicules sont publiées par des vendeurs professionnels et doivent être vérifiées avant toute transaction.
info.terms.point2=L'accès agent est réservé aux utilisateurs autorisés à gérer le stock et répondre aux demandes.
info.terms.point3=Les conditions commerciales finales de chaque transaction relèvent du concessionnaire annonceur.
info.disclaimer.title=Avertissement
info.disclaimer.subtitle=Informations légales
info.disclaimer.lead=La plateforme organise des informations commerciales de tiers mais ne remplace pas les vérifications techniques, documentaires ou contractuelles avant achat.
info.disclaimer.point1=Les images, prix et descriptions dépendent des informations fournies par le vendeur.
info.disclaimer.point2=La disponibilité du véhicule peut évoluer avant que l'acheteur ne contacte le concessionnaire.
info.disclaimer.point3=L'acheteur doit vérifier l'état, les documents et les conditions finales avant de conclure l'opération.
info.privacy.title=Déclaration de confidentialité
info.privacy.subtitle=Protection des données
info.privacy.lead=La plateforme traite les données de contact nécessaires pour répondre aux demandes, gérer les accès et sécuriser le service.
info.privacy.point1=Seules les données nécessaires au contact, à l'authentification et au support sont demandées.
info.privacy.point2=Les données envoyées via les formulaires servent à répondre aux demandes et à assurer la traçabilité opérationnelle.
info.privacy.point3=Les utilisateurs peuvent contacter la plateforme pour toute question sur le traitement ou l'accès à leurs données.
info.faq.title=Questions fréquentes
info.faq.subtitle=Aide de la plateforme
info.faq.lead=Cette page regroupe les questions les plus fréquentes sur la recherche de stock, le contact avec les agents et l'utilisation de la plateforme.
info.faq.point1=Les acheteurs peuvent filtrer l'inventaire par catégorie, état et autres critères.
info.faq.point2=Les agents se connectent pour gérer les annonces, les messages et les informations de profil.
info.faq.point3=Si vous avez besoin d'une aide supplémentaire, utilisez la page de contact pour que le support examine votre cas.
info.partsOrderStatus.title=État de la commande de pièces
info.partsOrderStatus.subtitle=Support pièces
info.partsOrderStatus.lead=Cette page centralise les informations de suivi des demandes liées aux pièces et leur coordination avec le support.
info.partsOrderStatus.point1=Le suivi est actuellement assuré par l'équipe support de la plateforme.
info.partsOrderStatus.point2=Ajoutez la référence de commande ou les détails du véhicule à votre demande pour accélérer le traitement.
info.partsOrderStatus.point3=La plateforme mettra à jour cette zone lorsqu'une expérience de suivi plus détaillée sera disponible.
info.qualityCodes.title=Codes de qualité
info.qualityCodes.subtitle=Référence qualité
info.qualityCodes.lead=Les codes de qualité aident à interpréter l'état du stock annoncé et à établir un langage commun entre acheteurs et vendeurs.
info.qualityCodes.point1=Chaque concessionnaire doit décrire aussi clairement que possible l'état du véhicule ou de la pièce.
info.qualityCodes.point2=Les codes servent de repère et ne remplacent pas la vérification commerciale et documentaire d'une annonce.
info.qualityCodes.point3=En cas de doute, demandez des précisions au vendeur avant de poursuivre.
