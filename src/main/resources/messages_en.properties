info.terms.title=Terms and conditions
info.terms.subtitle=Legal information
info.terms.lead=These terms describe how public marketplace pages, agent access and dealer enquiries are used within the platform.
info.terms.point1=Vehicle listings are published by professional sellers and should be reviewed before closing a transaction.
info.terms.point2=Agent access is intended for authorized users who manage stock and respond to enquiries.
info.terms.point3=The final commercial terms of each transaction belong to the advertising dealer.
info.disclaimer.title=Disclaimer
info.disclaimer.subtitle=Legal information
info.disclaimer.lead=The platform organizes third-party commercial information but does not replace the technical, documentary or contractual checks required before purchase.
info.disclaimer.point1=Images, prices and descriptions depend on information provided by the seller.
info.disclaimer.point2=Vehicle availability may change before the buyer contacts the dealer.
info.disclaimer.point3=The buyer must verify condition, documentation and final terms before completing the transaction.
info.privacy.title=Privacy statement
info.privacy.subtitle=Data protection
info.privacy.lead=The platform processes the contact data needed to answer enquiries, manage access and keep the service secure.
info.privacy.point1=Only the data needed to contact users, authenticate accounts and provide support is requested.
info.privacy.point2=Data submitted through forms is used to answer requests and maintain operational traceability.
info.privacy.point3=Users can contact the marketplace to ask about data processing and access.
info.faq.title=Frequently asked questions
info.faq.subtitle=Marketplace help
info.faq.lead=This page gathers the most common questions about stock search, agent contact and marketplace usage.
info.faq.point1=Buyers can filter inventory by category, condition and other criteria.
info.faq.point2=Agents sign in to manage listings, messages and profile information.
info.faq.point3=If you need more help, use the contact page so support can review your case.
info.partsOrderStatus.title=Parts order status
info.partsOrderStatus.subtitle=Parts support
info.partsOrderStatus.lead=This page centralizes follow-up information for parts-related enquiries and support coordination.
info.partsOrderStatus.point1=Tracking is currently handled through the marketplace support team.
info.partsOrderStatus.point2=Include the order reference or vehicle details in your enquiry to speed up the review.
info.partsOrderStatus.point3=The marketplace will update this area when a more detailed tracking experience is available.
info.qualityCodes.title=Quality codes
info.qualityCodes.subtitle=Quality reference
info.qualityCodes.lead=Quality codes help interpret advertised stock condition and create a shared language between buyers and sellers.
info.qualityCodes.point1=Each dealer should describe vehicle or parts condition as clearly as possible.
info.qualityCodes.point2=Codes are informative guidance and do not replace the commercial and documentary review of each listing.
info.qualityCodes.point3=If anything is unclear, request clarification from the seller before continuing.
