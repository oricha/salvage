<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Inventario en Lista | Portal de Coches')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="main">
    <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
        <div class="container">
            <h1 class="breadcrumb-title">Inventario en Lista</h1>
            <ul class="breadcrumb-menu">
                <li><a th:href="@{/}">Inicio</a></li>
                <li class="active">Vista lista</li>
            </ul>
        </div>
    </div>
    <section class="car-area list bg py-120 inventory-page-shell">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-4 col-xl-3">
                    <div th:replace="~{fragments/inventory-sidebar :: sidebar(@{/cars/list}, ${filters}, ${availableBrands}, ${modelsByMake}, ${sidebarFuelOptions}, ${sidebarTransmissionOptions})}"></div>
                </div>
                <div class="col-lg-8 col-xl-9">
                    <div class="car-sort mb-4">
                        <h6 th:text="'Mostrando ' + ${cars.numberOfElements} + ' de ' + ${totalItems} + ' resultados'">Mostrando resultados</h6>
                        <div class="car-sort-list-grid">
                            <a class="car-sort-grid" th:href="${gridViewUrl}"><i class="far fa-grid-2"></i></a>
                            <a class="car-sort-list active" th:href="${listViewUrl}"><i class="far fa-list-ul"></i></a>
                        </div>
                    </div>
                    <div th:if="${cars.isEmpty()}" class="alert alert-light border text-center">No hay vehículos que coincidan con los filtros seleccionados.</div>
                    <article class="car-item car-list-item mb-30 inventory-result-card inventory-result-card-list" th:each="car : ${cars}">
                        <div class="row g-0 align-items-center">
                            <div class="col-md-4">
                                <div class="car-img">
                                    <a class="inventory-result-link-overlay" th:href="@{/cars/{id}(id=${car.id})}" th:attr="aria-label=#{listing.viewDetails}">
                                        <img loading="lazy" th:src="@{${car.images != null && !car.images.isEmpty()} ? '/uploads/' + ${car.images[0]} : '/img/car/01.jpg'}" th:alt="${car.make + ' ' + car.model}">
                                    </a>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="car-content p-4">
                                    <div class="d-flex justify-content-between gap-3 flex-wrap">
                                        <div>
                                            <div class="d-flex gap-2 mb-2">
                                                <span class="badge bg-dark" th:text="${#messages.msg(car.category.messageKey)}">PASSENGER_CAR</span>
                                                <span class="badge bg-secondary" th:text="${car.condition == T(com.cardealer.model.enums.CarCondition).NUEVO ? #messages.msg('listing.badge.new') : car.condition}">OCASION</span>
                                            </div>
                                            <h3>
                                                <a th:href="@{/cars/{id}(id=${car.id})}"
                                                   th:text="${car.make + ' ' + car.model + (car.variant != null ? ' ' + car.variant : '') + (car.powerHp != null ? ' · ' + car.powerHp + ' HP' : '')}">
                                                    Vehículo
                                                </a>
                                            </h3>
                                            <p class="mb-0 text-muted inventory-result-summary"
                                               th:text="${car.description != null && car.description.length() > 160 ? car.description.substring(0, 160) + '…' : (car.description != null ? car.description : #messages.msg('listing.summary.fallback'))}">
                                                Descripción
                                            </p>
                                        </div>
                                        <div class="inventory-result-pricing text-md-end">
                                            <span class="car-price d-block" th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')} + ' €'">0 €</span>
                                            <span class="inventory-export-price"
                                                  th:if="${car.exportPrice != null}"
                                                  th:text="#{listing.exportPriceLabel} + ' ' + ${#numbers.formatDecimal(car.exportPrice, 0, 'COMMA', 2, 'POINT')} + ' €'">
                                                Export
                                            </span>
                                        </div>
                                    </div>
                                    <ul class="car-list mt-3">
                                        <li><i class="far fa-car"></i><span th:text="${car.year}">2024</span></li>
                                        <li><i class="far fa-road"></i><span th:text="${car.mileage + ' km'}">0 km</span></li>
                                        <li><i class="far fa-gas-pump"></i><span th:text="${car.fuelType}">Fuel</span></li>
                                        <li><i class="far fa-steering-wheel"></i><span th:text="${car.transmission}">Transmission</span></li>
                                    </ul>
                                    <div class="d-flex gap-2 align-items-center flex-wrap mt-3">
                                        <a th:href="@{/cars/{id}(id=${car.id})}" class="theme-btn">Ver detalle</a>
                                        <button
                                            type="button"
                                            class="inventory-favorite-toggle"
                                            th:classappend="${favoriteCarIds != null && favoriteCarIds.contains(car.id)} ? ' active' : ''"
                                            data-favorite-toggle
                                            th:attr="data-car-id=${car.id},data-login-url=@{/login},data-label-active=#{flow.favorite.saved},data-label-inactive=#{flow.favorite.save},aria-pressed=${favoriteCarIds != null && favoriteCarIds.contains(car.id)}">
                                            <i th:class="${favoriteCarIds != null && favoriteCarIds.contains(car.id)} ? 'fas fa-heart' : 'far fa-heart'"></i>
                                            <span data-favorite-label th:text="${favoriteCarIds != null && favoriteCarIds.contains(car.id)} ? #{flow.favorite.saved} : #{flow.favorite.save}">Guardar</span>
                                        </button>
                                    </div>
                                    <a class="inventory-dealer-link mt-3 d-inline-flex" th:if="${car.dealer != null}" th:href="@{/dealers/{id}(id=${car.dealer.id})}" th:text="${#messages.msg('flow.dealer.inventoryLink')} + ' ' + ${car.dealer.name}">Ver agente</a>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scroll-top}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
<script th:inline="javascript">
    window.inventoryModelsByMake = /*[[${modelsByMake}]]*/ {};
</script>
<script src="/js/inventory-sidebar.js"></script>
<script src="/js/favorite-toggle.js"></script>
</body>
</html>
