<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Inventario | Portal de Coches')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="main">
    <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
        <div class="container">
            <h1 class="breadcrumb-title">Inventario de Vehículos</h1>
            <ul class="breadcrumb-menu">
                <li><a th:href="@{/}">Inicio</a></li>
                <li class="active">Vista grid</li>
            </ul>
        </div>
    </div>
    <section class="car-area grid bg py-120">
        <div class="container">
            <div class="row">
                <div class="col-lg-3">
                    <div class="car-sidebar">
                        <form th:action="@{/cars}" method="get">
                            <div class="car-widget">
                                <h4 class="car-widget-title">Búsqueda</h4>
                                <input class="form-control" type="text" name="searchQuery" th:value="${filters.searchQuery ?: filters.searchText}" placeholder="Marca, modelo o descripción">
                            </div>
                            <div class="car-widget">
                                <h4 class="car-widget-title">Categorías</h4>
                                <ul>
                                    <li th:each="category, iterStat : ${categories}">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" name="categories" th:id="'category-' + ${iterStat.index}" th:value="${category}" th:checked="${filters.categories != null && filters.categories.contains(category)}">
                                            <label class="form-check-label" th:for="'category-' + ${iterStat.index}" th:text="${category}">PASSENGER_CAR</label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div class="car-widget">
                                <h4 class="car-widget-title">Condiciones</h4>
                                <ul>
                                    <li th:each="condition, iterStat : ${conditions}">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" name="conditions" th:id="'condition-' + ${iterStat.index}" th:value="${condition}" th:checked="${filters.conditions != null && filters.conditions.contains(condition)}">
                                            <label class="form-check-label" th:for="'condition-' + ${iterStat.index}" th:text="${condition}">OCASION</label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div class="car-widget">
                                <h4 class="car-widget-title">Precio</h4>
                                <input class="form-control mb-2" type="number" name="minPrice" th:value="${filters.minPrice}" placeholder="Desde">
                                <input class="form-control" type="number" name="maxPrice" th:value="${filters.maxPrice}" placeholder="Hasta">
                            </div>
                            <div class="car-widget">
                                <h4 class="car-widget-title">Kilometraje</h4>
                                <input class="form-control mb-2" type="number" name="minMileage" th:value="${filters.minMileage}" placeholder="Mínimo">
                                <input class="form-control" type="number" name="maxMileage" th:value="${filters.maxMileage}" placeholder="Máximo">
                            </div>
                            <div class="car-widget">
                                <button class="theme-btn w-100" type="submit">Aplicar filtros</button>
                                <a th:href="@{/cars}" class="theme-btn theme-btn2 w-100 mt-2">Limpiar</a>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-9">
                    <div class="car-sort mb-4">
                        <h6 th:text="'Mostrando ' + ${cars.numberOfElements} + ' de ' + ${totalItems} + ' resultados'">Mostrando resultados</h6>
                        <div class="car-sort-list-grid">
                            <a class="car-sort-grid active" th:href="@{/cars}"><i class="far fa-grid-2"></i></a>
                            <a class="car-sort-list" th:href="@{/cars/list}"><i class="far fa-list-ul"></i></a>
                        </div>
                    </div>
                    <div th:if="${cars.isEmpty()}" class="alert alert-light border text-center">No hay vehículos que coincidan con los filtros seleccionados.</div>
                    <div class="row">
                        <div class="col-md-6 col-xl-4" th:each="car : ${cars}">
                            <article class="car-item h-100">
                                <div class="car-img">
                                    <span class="car-status status-1" th:text="${car.condition}">OCASION</span>
                                    <span class="car-status status-2" style="left:auto;right:15px;" th:text="${car.category}">PASSENGER_CAR</span>
                                    <img loading="lazy" th:src="@{${car.images != null && !car.images.isEmpty()} ? '/uploads/' + ${car.images[0]} : '/img/car/01.jpg'}" th:alt="${car.make + ' ' + car.model}">
                                </div>
                                <div class="car-content">
                                    <h4><a th:href="@{/cars/{id}(id=${car.id})}" th:text="${car.make + ' ' + car.model}">Vehículo</a></h4>
                                    <ul class="car-list">
                                        <li><i class="far fa-road"></i><span th:text="${car.mileage + ' km'}">0 km</span></li>
                                        <li><i class="far fa-car"></i><span th:text="${car.year}">2024</span></li>
                                        <li><i class="far fa-gas-pump"></i><span th:text="${car.fuelType}">Fuel</span></li>
                                        <li><i class="far fa-steering-wheel"></i><span th:text="${car.transmission}">Transmission</span></li>
                                    </ul>
                                    <div class="car-footer">
                                        <span class="car-price" th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')} + ' €'">0 €</span>
                                        <a class="theme-btn" th:href="@{/cars/{id}(id=${car.id})}"><span class="far fa-eye"></span> Ver detalle</a>
                                    </div>
                                </div>
                            </article>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scroll-top}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
