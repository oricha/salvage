<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Inventario | Portal de Coches')}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="main">
    <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
        <div class="container">
            <h1 class="breadcrumb-title">Inventario de Vehículos</h1>
            <ul class="breadcrumb-menu">
                <li><a th:href="@{/}">Inicio</a></li>
                <li class="active">Vista grid</li>
            </ul>
        </div>
    </div>
    <section class="car-area grid bg py-120 inventory-page-shell">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-4 col-xl-3">
                    <div th:replace="~{fragments/inventory-sidebar :: sidebar(@{/cars}, ${filters}, ${availableBrands}, ${modelsByMake}, ${sidebarFuelOptions}, ${sidebarTransmissionOptions})}"></div>
                </div>
                <div class="col-lg-8 col-xl-9">
                    <div class="car-sort mb-4">
                        <h6 th:text="'Mostrando ' + ${cars.numberOfElements} + ' de ' + ${totalItems} + ' resultados'">Mostrando resultados</h6>
                        <div class="car-sort-list-grid">
                            <a class="car-sort-grid active" th:href="@{/cars}"><i class="far fa-grid-2"></i></a>
                            <a class="car-sort-list" th:href="@{/cars/list}"><i class="far fa-list-ul"></i></a>
                        </div>
                    </div>
                    <div th:if="${cars.isEmpty()}" class="alert alert-light border text-center">No hay vehículos que coincidan con los filtros seleccionados.</div>
                    <div class="row">
                        <div class="col-md-6 col-xl-4" th:each="car : ${cars}">
                            <article class="car-item h-100">
                                <div class="car-img">
                                    <span class="car-status status-1" th:text="${car.condition}">OCASION</span>
                                    <span class="car-status status-2" style="left:auto;right:15px;" th:text="${car.category}">PASSENGER_CAR</span>
                                    <img loading="lazy" th:src="@{${car.images != null && !car.images.isEmpty()} ? '/uploads/' + ${car.images[0]} : '/img/car/01.jpg'}" th:alt="${car.make + ' ' + car.model}">
                                </div>
                                <div class="car-content">
                                    <h4><a th:href="@{/cars/{id}(id=${car.id})}" th:text="${car.make + ' ' + car.model}">Vehículo</a></h4>
                                    <ul class="car-list">
                                        <li><i class="far fa-road"></i><span th:text="${car.mileage + ' km'}">0 km</span></li>
                                        <li><i class="far fa-car"></i><span th:text="${car.year}">2024</span></li>
                                        <li><i class="far fa-gas-pump"></i><span th:text="${car.fuelType}">Fuel</span></li>
                                        <li><i class="far fa-steering-wheel"></i><span th:text="${car.transmission}">Transmission</span></li>
                                    </ul>
                                    <div class="car-footer">
                                        <span class="car-price" th:text="${#numbers.formatDecimal(car.price, 0, 'COMMA', 2, 'POINT')} + ' €'">0 €</span>
                                        <a class="theme-btn" th:href="@{/cars/{id}(id=${car.id})}"><span class="far fa-eye"></span> Ver detalle</a>
                                    </div>
                                </div>
                            </article>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scroll-top}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
<script th:inline="javascript">
    window.inventoryModelsByMake = /*[[${modelsByMake}]]*/ {};
</script>
<script src="/js/inventory-sidebar.js"></script>
</body>
</html>
