<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(${isEdit} ? 'Editar Listado - Portal de Coches' : 'Añadir Listado - Portal de Coches')}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <main class="main">
        <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
            <div class="container">
                <h2 class="breadcrumb-title" th:text="${isEdit} ? 'Editar Listado' : 'Añadir Listado'">Añadir Listado</h2>
                <ul class="breadcrumb-menu">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li><a th:href="@{/dashboard}">Dashboard</a></li>
                    <li class="active" th:text="${isEdit} ? 'Editar' : 'Añadir'">Añadir</li>
                </ul>
            </div>
        </div>

        <div class="user-profile py-120">
            <div class="container">
                <div class="user-profile-card">
                    <h4 class="user-profile-card-title" th:text="${isEdit} ? 'Editar listado' : 'Crear nuevo listado'">Crear</h4>

                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                        Revisa los campos marcados antes de continuar.
                    </div>

                    <form th:action="${isEdit} ? @{/dashboard/listings/edit/{id}(id=${carId})} : @{/dashboard/listings/add}"
                          th:object="${carDTO}"
                          method="post"
                          enctype="multipart/form-data">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label">Marca *</label>
                                <input th:field="*{brand}" class="form-control" th:classappend="${#fields.hasErrors('brand')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{brand}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Modelo *</label>
                                <input th:field="*{model}" class="form-control" th:classappend="${#fields.hasErrors('model')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{model}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Año *</label>
                                <input type="number" th:field="*{year}" class="form-control" th:classappend="${#fields.hasErrors('year')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{year}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Precio *</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Kilometraje</label>
                                <input type="number" th:field="*{mileage}" class="form-control" th:classappend="${#fields.hasErrors('mileage')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{mileage}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Condición *</label>
                                <select th:field="*{condition}" class="form-control" th:classappend="${#fields.hasErrors('condition')} ? ' is-invalid'">
                                    <option value="">Seleccionar</option>
                                    <option th:each="condition : ${conditions}" th:value="${condition.name()}" th:text="${condition}">NUEVO</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{condition}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Categoría *</label>
                                <select th:field="*{category}" class="form-control" th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'">
                                    <option value="">Seleccionar</option>
                                    <option th:each="category : ${categories}" th:value="${category.name()}" th:text="${#messages.msg(category.messageKey)}">PASSENGER_CAR</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{category}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Carrocería</label>
                                <select th:field="*{bodyType}" class="form-control">
                                    <option value="">Seleccionar</option>
                                    <option th:each="bodyType : ${bodyTypes}" th:value="${bodyType.name()}" th:text="${bodyType}">SUV</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Transmisión *</label>
                                <select th:field="*{transmission}" class="form-control" th:classappend="${#fields.hasErrors('transmission')} ? ' is-invalid'">
                                    <option value="">Seleccionar</option>
                                    <option th:each="transmission : ${transmissions}" th:value="${transmission.name()}" th:text="${transmission}">MANUAL</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{transmission}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Combustible *</label>
                                <select th:field="*{fuelType}" class="form-control" th:classappend="${#fields.hasErrors('fuelType')} ? ' is-invalid'">
                                    <option value="">Seleccionar</option>
                                    <option th:each="fuelType : ${fuelTypes}" th:value="${fuelType.name()}" th:text="${fuelType}">GASOLINA</option>
                                </select>
                                <div class="invalid-feedback" th:errors="*{fuelType}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Color</label>
                                <input th:field="*{color}" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Puertas</label>
                                <input type="number" th:field="*{doors}" class="form-control" th:classappend="${#fields.hasErrors('doors')} ? ' is-invalid'">
                                <div class="invalid-feedback" th:errors="*{doors}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Motor</label>
                                <input th:field="*{engine}" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Idioma del anuncio *</label>
                                <select th:field="*{locale}" class="form-control">
                                    <option th:each="localeOption : ${locales}" th:value="${localeOption}" th:text="${#strings.toUpperCase(localeOption)}">ES</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descripción</label>
                                <textarea th:field="*{description}" class="form-control" rows="5"></textarea>
                            </div>

                            <div class="col-12">
                                <h6 class="mb-3">Características</h6>
                                <div class="row g-2">
                                    <div class="col-md-4" th:each="feature, iterStat : ${availableFeatures}">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   th:field="*{features}"
                                                   th:value="${feature}"
                                                   th:id="'feature-' + ${iterStat.index}">
                                            <label class="form-check-label"
                                                   th:for="'feature-' + ${iterStat.index}"
                                                   th:text="${feature}">Feature</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12">
                                <h6 class="mb-3">Imágenes</h6>
                                <input type="file" class="form-control" name="imageFiles" id="imageFiles" multiple accept="image/*" th:required="${!isEdit}">
                                <small class="text-muted d-block">Debes mantener entre 20 y 25 imágenes por vehículo. Formatos permitidos: JPG, PNG y WebP hasta 10MB.</small>
                                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('imageFiles')}" th:errors="*{imageFiles}"></div>
                            </div>

                            <div class="col-12" th:if="${isEdit and carDTO.existingImages != null}">
                                <div class="row g-3" id="existingImagesGrid">
                                    <div class="col-md-3" th:each="img, iterStat : ${carDTO.existingImages}">
                                        <input type="hidden" name="existingImages" th:value="${img}">
                                        <div class="card h-100 existing-image-card" draggable="true">
                                            <img th:src="@{'/uploads/' + ${img}}" class="img-thumbnail" alt="Imagen actual">
                                            <div class="card-body p-2">
                                                <small class="text-muted">Arrastra para reordenar</small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="row g-3" id="imagePreview"></div>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="theme-btn">
                                    <span th:text="${isEdit} ? 'Actualizar listado' : 'Guardar y publicar'">Guardar</span>
                                </button>
                                <a th:href="@{/dashboard/listings}" class="theme-btn theme-btn2 ms-2">Cancelar</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/footer :: scroll-top}"></div>
    <div th:replace="~{fragments/header :: scripts}"></div>
    <script>
        const imageInput = document.getElementById('imageFiles');
        const previewContainer = document.getElementById('imagePreview');
        const existingGrid = document.getElementById('existingImagesGrid');

        if (imageInput && previewContainer) {
            imageInput.addEventListener('change', () => {
                previewContainer.innerHTML = '';
                let files = Array.from(imageInput.files || []);
                files.forEach((file, index) => {
                    if (!file.type.startsWith('image/')) {
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = event => {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'col-md-3 sortable-preview';
                        wrapper.draggable = true;
                        wrapper.dataset.index = String(index);
                        wrapper.innerHTML = `<div class="card h-100"><img src="${event.target.result}" class="img-thumbnail" alt="Vista previa" loading="lazy"><div class="card-body p-2"><small class="text-muted">Arrastra para reordenar</small></div></div>`;
                        previewContainer.appendChild(wrapper);
                    };
                    reader.readAsDataURL(file);
                });
                enablePreviewReordering();
            });
        }

        function enablePreviewReordering() {
            let dragged = null;
            previewContainer.querySelectorAll('.sortable-preview').forEach(item => {
                item.addEventListener('dragstart', () => {
                    dragged = item;
                });
                item.addEventListener('dragover', event => event.preventDefault());
                item.addEventListener('drop', event => {
                    event.preventDefault();
                    if (!dragged || dragged === item) {
                        return;
                    }
                    const items = Array.from(previewContainer.children);
                    const draggedIndex = items.indexOf(dragged);
                    const targetIndex = items.indexOf(item);
                    if (draggedIndex < targetIndex) {
                        previewContainer.insertBefore(dragged, item.nextSibling);
                    } else {
                        previewContainer.insertBefore(dragged, item);
                    }
                    syncFileInputWithPreview();
                });
            });
        }

        function syncFileInputWithPreview() {
            if (!imageInput || !window.DataTransfer) {
                return;
            }
            const currentFiles = Array.from(imageInput.files || []);
            const reordered = Array.from(previewContainer.children)
                .map(item => currentFiles[Number(item.dataset.index)])
                .filter(Boolean);
            const transfer = new DataTransfer();
            reordered.forEach(file => transfer.items.add(file));
            imageInput.files = transfer.files;
            Array.from(previewContainer.children).forEach((item, index) => {
                item.dataset.index = String(index);
            });
        }

        if (existingGrid) {
            let draggedCard = null;
            existingGrid.querySelectorAll('.col-md-3').forEach(item => {
                item.addEventListener('dragstart', () => {
                    draggedCard = item;
                });
                item.addEventListener('dragover', event => event.preventDefault());
                item.addEventListener('drop', event => {
                    event.preventDefault();
                    if (!draggedCard || draggedCard === item) {
                        return;
                    }
                    const items = Array.from(existingGrid.children);
                    const draggedIndex = items.indexOf(draggedCard);
                    const targetIndex = items.indexOf(item);
                    if (draggedIndex < targetIndex) {
                        existingGrid.insertBefore(draggedCard, item.nextSibling);
                    } else {
                        existingGrid.insertBefore(draggedCard, item);
                    }
                });
            });
        }
    </script>
</body>

</html>
