<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(formAction, filters, availableBrands, modelsByMake, sidebarFuelOptions, sidebarTransmissionOptions)"
       class="inventory-filter-shell">
    <button class="inventory-filter-mobile-btn d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#inventoryFilterDrawer" aria-controls="inventoryFilterDrawer">
        <i class="far fa-magnifying-glass"></i> <span th:text="#{search.filterButton}">Filter</span>
    </button>

    <div class="inventory-filter-desktop d-none d-lg-block">
        <div th:replace="~{fragments/inventory-sidebar :: sidebarContent(${formAction}, ${filters}, ${availableBrands}, ${modelsByMake}, ${sidebarFuelOptions}, ${sidebarTransmissionOptions})}"></div>
    </div>

    <div class="offcanvas offcanvas-start inventory-filter-offcanvas" tabindex="-1" id="inventoryFilterDrawer" aria-labelledby="inventoryFilterDrawerLabel">
        <div class="offcanvas-header">
            <h5 id="inventoryFilterDrawerLabel" th:text="#{search.drawerTitle}">Vehicle filters</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div th:replace="~{fragments/inventory-sidebar :: sidebarContent(${formAction}, ${filters}, ${availableBrands}, ${modelsByMake}, ${sidebarFuelOptions}, ${sidebarTransmissionOptions})}"></div>
        </div>
    </div>
</aside>

<div th:fragment="sidebarContent(formAction, filters, availableBrands, modelsByMake, sidebarFuelOptions, sidebarTransmissionOptions)"
     class="inventory-filter-sidebar"
     th:with="activeCategory=${filters.categories != null && !filters.categories.isEmpty() ? filters.categories[0].name() : 'DAMAGED'}">
    <div class="inventory-filter-sticky">
        <h2 class="inventory-filter-title" th:text="${activeCategory == 'SALVAGE' ? 'Salvage' : (activeCategory == 'PASSENGER_CAR' ? 'Occasion' : 'Damaged')}">Damaged</h2>

        <div class="inventory-filter-tabs">
            <a class="inventory-filter-tab" th:classappend="${activeCategory == 'DAMAGED'} ? ' active' : ''" th:href="@{/cars/damaged}">
                <i class="far fa-car-burst"></i>
                <span>Damaged</span>
            </a>
            <a class="inventory-filter-tab" th:classappend="${activeCategory == 'SALVAGE'} ? ' active' : ''" th:href="@{/cars/salvage}">
                <i class="far fa-screwdriver-wrench"></i>
                <span>Disassembly</span>
            </a>
            <a class="inventory-filter-tab" th:classappend="${activeCategory == 'PASSENGER_CAR'} ? ' active' : ''" th:href="@{/cars(categories='PASSENGER_CAR')}">
                <i class="far fa-car-side"></i>
                <span>Occasion</span>
            </a>
        </div>

        <form th:action="${formAction}" method="get" class="inventory-filter-form" id="inventoryFilterForm">
            <div class="inventory-form-group">
                <label for="sidebarBrandSearch" th:text="#{search.brand.label}">Brand</label>
                <input id="sidebarBrandSearch" type="text" class="form-control mb-2" th:placeholder="#{search.brand.searchPlaceholder}">
                <select id="sidebarBrand" class="form-select" name="brands">
                    <option value="" th:text="#{search.brand.placeholder}">choose brand</option>
                    <option th:each="brand : ${availableBrands}" th:value="${brand}" th:text="${brand}" th:selected="${filters.brands != null && filters.brands.contains(brand)}">Hyundai</option>
                </select>
            </div>

            <div class="inventory-form-group">
                <label for="sidebarModel" th:text="#{search.model.label}">Model</label>
                <select id="sidebarModel" class="form-select" name="model" th:attr="data-selected=${filters.model},data-placeholder=#{search.model.placeholder}">
                    <option value="" th:text="#{search.model.placeholder}">choose a model</option>
                </select>
            </div>

            <div class="inventory-form-group">
                <label th:text="#{search.year.label}">Manufacturing year</label>
                <div class="inventory-range-row">
                    <select class="form-select" name="yearFrom">
                        <option value="" th:text="#{search.year.fromPlaceholder}">From</option>
                        <option th:each="year : ${#numbers.sequence(1936, 2026)}" th:value="${year}" th:text="${year}" th:selected="${filters.yearFrom == year}">1936</option>
                    </select>
                    <span th:text="#{search.year.toSeparator}">to</span>
                    <select class="form-select" name="yearTo">
                        <option value="" th:text="#{search.year.toPlaceholder}">To</option>
                        <option th:each="year : ${#numbers.sequence(1936, 2026)}" th:value="${year}" th:text="${year}" th:selected="${filters.yearTo == year}">2026</option>
                    </select>
                </div>
            </div>

            <div class="inventory-form-group">
                <label for="sidebarFuel" th:text="#{search.fuel.label}">Fuel type</label>
                <select id="sidebarFuel" class="form-select" name="fuelTypes" multiple size="6">
                    <option th:each="fuel : ${sidebarFuelOptions}"
                            th:if="${!fuel.value.isEmpty()}"
                            th:value="${fuel.value}"
                            th:text="${#messages.msg(fuel.labelKey)}"
                            th:selected="${(filters.fuelTypes != null && filters.fuelTypes.contains(fuel.value)) || filters.fuelType == fuel.value}">
                        all kind of fuels
                    </option>
                </select>
            </div>

            <div class="inventory-form-group">
                <label for="sidebarTransmission" th:text="#{search.transmission.label}">Transmission</label>
                <select id="sidebarTransmission" class="form-select" name="transmissions" multiple size="3">
                    <option th:each="transmission : ${sidebarTransmissionOptions}"
                            th:if="${!transmission.value.isEmpty()}"
                            th:value="${transmission.value}"
                            th:text="${#messages.msg(transmission.labelKey)}"
                            th:selected="${(filters.transmissions != null && filters.transmissions.contains(transmission.value)) || filters.transmission == transmission.value}">
                        all transmissions
                    </option>
                </select>
            </div>

            <div class="inventory-price-indicator">
                <span th:text="#{search.primaryFiltersNotice}">Brand, model, year, fuel and transmission define the advanced search.</span>
            </div>

            <button class="inventory-submit-btn" type="submit" th:text="#{search.submit}">Search</button>

            <div class="inventory-hidden-category-fields" th:if="${filters.categories != null}">
                <input th:each="category : ${filters.categories}" type="hidden" name="categories" th:value="${category}">
            </div>
        </form>
    </div>
</div>
</body>
</html>
