<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head('Parking - Portal de Coches')}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <main class="main">
        <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
            <div class="container">
                <h2 class="breadcrumb-title">Parking de vehículos</h2>
                <ul class="breadcrumb-menu">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li class="active">Parking</li>
                </ul>
            </div>
        </div>

        <div class="user-profile py-120">
            <div class="container">
                <div class="user-profile-card profile-favorite">
                    <div class="section-head">
                        <div>
                            <span class="section-kicker">Parking</span>
                            <h4 class="user-profile-card-title">Vehículos guardados</h4>
                        </div>
                        <a th:href="@{/cars}" class="theme-btn">Seguir buscando</a>
                    </div>

                    <div th:if="${favoriteCars == null or favoriteCars.isEmpty()}" class="text-center py-5">
                        <i class="far fa-heart" style="font-size: 4rem; color: #ccc;"></i>
                        <p class="text-muted mt-3">No tienes coches guardados todavía.</p>
                        <a th:href="@{/cars}" class="theme-btn mt-3">Explorar inventario</a>
                    </div>

                    <div class="row" th:if="${favoriteCars != null and !favoriteCars.isEmpty()}">
                        <div th:each="car : ${favoriteCars}" class="col-md-6 col-lg-4 favorite-card-shell">
                            <div class="car-item">
                                <div class="car-img">
                                    <img th:src="@{${car.images != null and !car.images.isEmpty()} ? '/uploads/' + ${car.images[0]} : '/img/car/01.jpg'}"
                                         alt="Imagen del coche">
                                    <div class="car-btns">
                                        <a href="#" class="remove-favorite" th:data-car-id="${car.id}" title="Eliminar del parking">
                                            <i class="far fa-trash-can"></i>
                                        </a>
                                        <a th:href="@{/cars/{id}(id=${car.id})}" title="Ver detalle">
                                            <i class="far fa-eye"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="car-content">
                                    <h4>
                                        <a th:href="@{/cars/{id}(id=${car.id})}" th:text="${car.make + ' ' + car.model}">Vehículo</a>
                                    </h4>
                                    <ul class="car-list">
                                        <li><i class="far fa-car"></i><span th:text="${car.year}">2024</span></li>
                                        <li><i class="far fa-road"></i><span th:text="${car.mileage + ' km'}">12.000 km</span></li>
                                        <li><i class="far fa-gas-pump"></i><span th:text="${car.fuelType}">Diésel</span></li>
                                    </ul>
                                    <div class="car-footer">
                                        <span class="car-price" th:text="${#numbers.formatDecimal(car.price, 0, 2)} + ' €'">22.000 €</span>
                                        <a th:href="@{/cars/{id}(id=${car.id})}" class="theme-btn">Detalles</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="recently-viewed-block mt-5" th:if="${recentlyViewedCars != null and !recentlyViewedCars.isEmpty()}">
                        <div class="section-head">
                            <div>
                                <span class="section-kicker">Últimos vistos</span>
                                <h5>Retoma tu búsqueda reciente</h5>
                            </div>
                        </div>
                        <div class="row">
                            <div th:each="car : ${recentlyViewedCars}" class="col-md-6 col-xl-3">
                                <div class="car-item">
                                    <div class="car-img">
                                        <img th:src="@{${car.images != null and !car.images.isEmpty()} ? '/uploads/' + ${car.images[0]} : '/img/car/01.jpg'}"
                                             alt="Imagen del coche">
                                    </div>
                                    <div class="car-content">
                                        <h4>
                                            <a th:href="@{/cars/{id}(id=${car.id})}" th:text="${car.make + ' ' + car.model}">Vehículo</a>
                                        </h4>
                                        <div class="car-footer">
                                            <span class="car-price" th:text="${#numbers.formatDecimal(car.price, 0, 2)} + ' €'">22.000 €</span>
                                            <a th:href="@{/cars/{id}(id=${car.id})}" class="theme-btn">Ver de nuevo</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/footer :: scroll-top}"></div>
    <div th:replace="~{fragments/header :: scripts}"></div>
    <script>
        $(document).on('click', '.remove-favorite', function (e) {
            e.preventDefault();
            if (!window.confirm('¿Seguro que quieres eliminar este vehículo del parking?')) {
                return;
            }

            const carId = $(this).data('car-id');
            const $card = $(this).closest('.favorite-card-shell');

            $.post('/favorites/remove/' + carId)
                .done(function (response) {
                    if (response.success) {
                        $card.fadeOut(250, function () {
                            $(this).remove();
                            if ($('.favorite-card-shell').length === 0) {
                                window.location.reload();
                            }
                        });
                    }
                });
        });
    </script>
</body>

</html>
