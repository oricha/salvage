<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: head(${#messages.msg(titleKey)})}"></head>

<body>
    <nav th:replace="~{fragments/header :: navbar}"></nav>

    <main class="main">
        <div class="site-breadcrumb" style="background: url(/img/breadcrumb/01.jpg)">
            <div class="container">
                <h2 class="breadcrumb-title" th:text="${#messages.msg(titleKey)}">Information</h2>
                <ul class="breadcrumb-menu">
                    <li><a th:href="@{/}" th:text="#{nav.home}">Inicio</a></li>
                    <li class="active" th:text="${#messages.msg(titleKey)}">Information</li>
                </ul>
            </div>
        </div>

        <section class="about-area py-120">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-10 col-xl-8">
                        <div class="about-right">
                            <div class="site-heading mb-3 text-center">
                                <span class="site-title-tagline" th:text="${#messages.msg(subtitleKey)}">Support</span>
                                <h1 class="site-title" th:text="${#messages.msg(titleKey)}">Information</h1>
                            </div>
                            <p class="about-text text-center" th:text="${#messages.msg(leadKey)}">
                                This page explains the current policy and navigation entry point.
                            </p>

                            <div class="about-list-wrapper mt-5">
                                <ul class="about-list list-unstyled">
                                    <li th:each="pointKey : ${pointKeys}">
                                        <i class="fas fa-check-circle"></i>
                                        <span th:text="${#messages.msg(pointKey)}">Point</span>
                                    </li>
                                </ul>
                            </div>

                            <div class="text-center mt-4">
                                <a th:href="@{/contact}" class="theme-btn" th:text="#{info.contactCta}">Contact us</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <div th:replace="~{fragments/footer :: scroll-top}"></div>
    <div th:replace="~{fragments/header :: scripts}"></div>
</body>

</html>
