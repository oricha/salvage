<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(#{comingSoon.title})}"></head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>
<main class="main">
    <div th:replace="~{fragments/header :: breadcrumb(#{comingSoon.title}, ${breadcrumbItems})}"></div>
    <section class="coming-soon pt-120 pb-90" style="background: url('/img/coming-soon/01.jpg');">
        <div class="container">
            <div class="row align-items-center justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="coming-soon-content text-white text-center">
                        <span class="badge bg-warning text-dark mb-3" th:text="#{common.comingSoon}">Próximamente</span>
                        <h1 class="text-white" th:text="#{comingSoon.heading}">Estamos preparando algo nuevo</h1>
                        <h3 class="text-white mb-3" th:text="${#messages.msgOrNull(featureKey) != null ? #messages.msg(featureKey) : feature}">Used Parts</h3>
                        <p class="lead" th:text="#{comingSoon.description(${#messages.msgOrNull(featureKey) != null ? #messages.msg(featureKey) : feature})}">
                            Estamos preparando esta sección y avisaremos en cuanto esté disponible.
                        </p>
                        <div class="countdown-wrap my-4">
                            <div class="row g-3 justify-content-center">
                                <div class="col-6 col-md-3">
                                    <div class="bg-dark bg-opacity-50 rounded p-3">
                                        <strong class="d-block fs-3">20+</strong>
                                        <span th:text="#{comingSoon.preview.inventory}">vehículos previstos</span>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="bg-dark bg-opacity-50 rounded p-3">
                                        <strong class="d-block fs-3">5</strong>
                                        <span th:text="#{comingSoon.preview.languages}">idiomas</span>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="bg-dark bg-opacity-50 rounded p-3">
                                        <strong class="d-block fs-3">24/7</strong>
                                        <span th:text="#{comingSoon.preview.support}">seguimiento</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-12 col-md-7 col-lg-6">
                    <form class="newsletter-form position-relative">
                        <input type="email" class="input-newsletter form-control" th:placeholder="#{newsletter.emailPlaceholder}" name="email" required autocomplete="off">
                        <button type="submit" th:text="#{newsletter.subscribe}">Suscribirme</button>
                    </form>
                    <p class="text-center text-white mt-3 mb-0" th:text="#{comingSoon.formHelp}">
                        Te avisaremos cuando esta sección esté lista para publicar o buscar vehículos.
                    </p>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scroll-top}"></div>
<div th:replace="~{fragments/header :: scripts}"></div>
</body>
</html>
