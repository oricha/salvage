# Server Configuration
server.port=8080

# Application Name
spring.application.name=car-salvage
spring.profiles.default=dev

# JPA Configuration
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Flyway
spring.flyway.locations=classpath:db/migration
spring.sql.init.mode=never

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.messages.basename=messages
spring.messages.fallback-to-system-locale=false

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.max-age=1800

# Upload and marketplace configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=260MB
marketplace.images.min-count=20
marketplace.images.max-count=25
marketplace.images.max-file-size-mb=10
marketplace.supported-locales=es,en,nl,de,fr
marketplace.cache.vehicles-ttl-minutes=5
marketplace.cache.dealers-ttl-minutes=5
marketplace.cache.i18n-ttl-minutes=30
