info.contactCta=Contact opnemen met support
info.terms.title=Algemene voorwaarden
info.terms.subtitle=Juridische informatie
info.terms.lead=Deze voorwaarden beschrijven het gebruik van de openbare marktplaatspagina's, agenttoegang en dealercontact via het platform.
info.terms.point1=Voertuigadvertenties worden gepubliceerd door professionele verkopers en moeten vóór een transactie worden gecontroleerd.
info.terms.point2=Agenttoegang is bedoeld voor geautoriseerde gebruikers die voorraad beheren en op aanvragen reageren.
info.terms.point3=De uiteindelijke commerciële voorwaarden van elke transactie behoren toe aan de adverterende dealer.
info.disclaimer.title=Disclaimer
info.disclaimer.subtitle=Juridische informatie
info.disclaimer.lead=Het platform bundelt commerciële informatie van derden, maar vervangt niet de technische, documentatie- of contractcontroles die voor aankoop nodig zijn.
info.disclaimer.point1=Afbeeldingen, prijzen en beschrijvingen zijn afhankelijk van informatie van de verkoper.
info.disclaimer.point2=De beschikbaarheid van het voertuig kan veranderen voordat de koper contact opneemt met de dealer.
info.disclaimer.point3=De koper moet staat, documenten en definitieve voorwaarden controleren voordat de transactie wordt afgerond.
info.privacy.title=Privacyverklaring
info.privacy.subtitle=Gegevensbescherming
info.privacy.lead=Het platform verwerkt de contactgegevens die nodig zijn om aanvragen te beantwoorden, toegang te beheren en de dienst veilig te houden.
info.privacy.point1=Alleen gegevens die nodig zijn voor contact, authenticatie en ondersteuning worden gevraagd.
info.privacy.point2=Gegevens uit formulieren worden gebruikt om verzoeken te beantwoorden en operationele traceerbaarheid te behouden.
info.privacy.point3=Gebruikers kunnen contact opnemen met de marktplaats over gegevensverwerking en inzage.
info.faq.title=Veelgestelde vragen
info.faq.subtitle=Hulp bij de marktplaats
info.faq.lead=Deze pagina bundelt de meest voorkomende vragen over zoeken in voorraad, contact met agenten en gebruik van de marktplaats.
info.faq.point1=Kopers kunnen de voorraad filteren op categorie, staat en andere criteria.
info.faq.point2=Agenten loggen in om advertenties, berichten en profielgegevens te beheren.
info.faq.point3=Heb je extra hulp nodig, gebruik dan de contactpagina zodat support je situatie kan bekijken.
info.partsOrderStatus.title=Status onderdelenbestelling
info.partsOrderStatus.subtitle=Onderdelenondersteuning
info.partsOrderStatus.lead=Deze pagina centraliseert opvolginformatie voor onderdelenaanvragen en de afstemming met support.
info.partsOrderStatus.point1=Opvolging wordt momenteel afgehandeld via het supportteam van de marktplaats.
info.partsOrderStatus.point2=Voeg de bestelreferentie of voertuiginformatie toe aan je aanvraag om de beoordeling te versnellen.
info.partsOrderStatus.point3=De marktplaats werkt dit onderdeel bij zodra een uitgebreidere trackingervaring beschikbaar is.
info.qualityCodes.title=Kwaliteitscodes
info.qualityCodes.subtitle=Kwaliteitsreferentie
info.qualityCodes.lead=Kwaliteitscodes helpen de staat van geadverteerde voorraad te interpreteren en zorgen voor een gedeelde taal tussen kopers en verkopers.
info.qualityCodes.point1=Elke dealer moet de staat van voertuig of onderdeel zo duidelijk mogelijk beschrijven.
info.qualityCodes.point2=Codes zijn een richtlijn en vervangen niet de commerciële en documentcontrole van elke advertentie.
info.qualityCodes.point3=Vraag bij onduidelijkheid eerst extra toelichting aan de verkoper voordat je verdergaat.
