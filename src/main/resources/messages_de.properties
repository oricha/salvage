info.terms.title=Allgemeine Geschäftsbedingungen
info.terms.subtitle=Rechtliche Informationen
info.terms.lead=Diese Bedingungen beschreiben die Nutzung der öffentlichen Marktplatzseiten, des Agentenzugangs und der Händleranfragen.
info.terms.point1=Fahrzeugangebote werden von professionellen Anbietern veröffentlicht und sollten vor Vertragsabschluss geprüft werden.
info.terms.point2=Der Agentenzugang ist für autorisierte Nutzer vorgesehen, die Bestand verwalten und Anfragen beantworten.
info.terms.point3=Die endgültigen kommerziellen Bedingungen jeder Transaktion liegen beim inserierenden Händler.
info.disclaimer.title=Haftungsausschluss
info.disclaimer.subtitle=Rechtliche Informationen
info.disclaimer.lead=Die Plattform bündelt kommerzielle Informationen Dritter, ersetzt aber nicht die technischen, dokumentarischen oder vertraglichen Prüfungen vor einem Kauf.
info.disclaimer.point1=Bilder, Preise und Beschreibungen beruhen auf den Angaben des Verkäufers.
info.disclaimer.point2=Die Verfügbarkeit des Fahrzeugs kann sich ändern, bevor der Käufer den Händler kontaktiert.
info.disclaimer.point3=Der Käufer muss Zustand, Unterlagen und Endbedingungen vor Abschluss der Transaktion prüfen.
info.privacy.title=Datenschutzerklärung
info.privacy.subtitle=Datenschutz
info.privacy.lead=Die Plattform verarbeitet die Kontaktdaten, die zur Beantwortung von Anfragen, zur Zugangsverwaltung und zur Sicherung des Dienstes erforderlich sind.
info.privacy.point1=Es werden nur die Daten erhoben, die für Kontakt, Authentifizierung und Support erforderlich sind.
info.privacy.point2=Formulardaten werden genutzt, um Anfragen zu beantworten und die operative Nachvollziehbarkeit sicherzustellen.
info.privacy.point3=Nutzer können den Marktplatz kontaktieren, um Fragen zur Datenverarbeitung und zum Datenzugang zu stellen.
info.faq.title=Häufige Fragen
info.faq.subtitle=Marktplatz-Hilfe
info.faq.lead=Diese Seite bündelt die häufigsten Fragen zur Fahrzeugsuche, zum Agentenkontakt und zur Nutzung des Marktplatzes.
info.faq.point1=Käufer können den Bestand nach Kategorie, Zustand und weiteren Kriterien filtern.
info.faq.point2=Agenten melden sich an, um Inserate, Nachrichten und Profildaten zu verwalten.
info.faq.point3=Wenn Sie weitere Hilfe benötigen, nutzen Sie die Kontaktseite, damit der Support Ihren Fall prüfen kann.
info.partsOrderStatus.title=Status der Teilebestellung
info.partsOrderStatus.subtitle=Teile-Support
info.partsOrderStatus.lead=Diese Seite bündelt Informationen zum Bearbeitungsstand von Teileanfragen und deren Koordination mit dem Support.
info.partsOrderStatus.point1=Die Nachverfolgung erfolgt derzeit über das Support-Team des Marktplatzes.
info.partsOrderStatus.point2=Geben Sie in Ihrer Anfrage die Bestellreferenz oder Fahrzeuginformationen an, um die Prüfung zu beschleunigen.
info.partsOrderStatus.point3=Der Marktplatz wird diesen Bereich erweitern, sobald eine detailliertere Verfolgung verfügbar ist.
info.qualityCodes.title=Qualitätscodes
info.qualityCodes.subtitle=Qualitätsreferenz
info.qualityCodes.lead=Qualitätscodes helfen dabei, den Zustand des angebotenen Bestands einzuordnen und eine gemeinsame Sprache zwischen Käufern und Verkäufern zu schaffen.
info.qualityCodes.point1=Jeder Händler sollte den Zustand des Fahrzeugs oder Teils so klar wie möglich beschreiben.
info.qualityCodes.point2=Die Codes dienen als Orientierung und ersetzen nicht die kaufmännische und dokumentarische Prüfung eines Angebots.
info.qualityCodes.point3=Wenn etwas unklar ist, fordern Sie vor dem nächsten Schritt eine Klärung beim Verkäufer an.
