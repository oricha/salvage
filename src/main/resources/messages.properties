info.terms.title=Términos y condiciones
info.terms.subtitle=Información legal
info.terms.lead=Estas condiciones describen cómo se usan las páginas públicas del marketplace, el acceso de agentes y el envío de consultas a concesionarios.
info.terms.point1=Las fichas de vehículos son publicadas por vendedores profesionales y deben revisarse antes de cerrar una operación.
info.terms.point2=El acceso agente está destinado a usuarios autorizados para gestionar stock y responder consultas.
info.terms.point3=Las condiciones comerciales definitivas de cada operación corresponden al concesionario anunciante.
info.disclaimer.title=Descargo de responsabilidad
info.disclaimer.subtitle=Información legal
info.disclaimer.lead=El portal organiza información comercial de terceros, pero no sustituye la revisión documental, técnica o contractual que exige cada compra.
info.disclaimer.point1=Las imágenes, precios y descripciones dependen de la información facilitada por el vendedor.
info.disclaimer.point2=La disponibilidad del vehículo puede cambiar antes de que el comprador contacte con el concesionario.
info.disclaimer.point3=El comprador debe verificar estado, documentación y condiciones finales antes de formalizar la operación.
info.privacy.title=Declaración de privacidad
info.privacy.subtitle=Protección de datos
info.privacy.lead=La plataforma trata los datos de contacto necesarios para responder consultas, gestionar accesos y mantener la seguridad del servicio.
info.privacy.point1=Solo se solicitan los datos necesarios para contactar, autenticar usuarios y prestar soporte.
info.privacy.point2=Los datos enviados en formularios se usan para responder solicitudes y mantener trazabilidad operativa.
info.privacy.point3=Los usuarios pueden contactar con el portal para resolver dudas sobre tratamiento y acceso a sus datos.
info.faq.title=Preguntas frecuentes
info.faq.subtitle=Ayuda del portal
info.faq.lead=Aquí reunimos las preguntas más habituales sobre búsqueda de stock, contacto con agentes y uso del marketplace.
info.faq.point1=Los compradores pueden filtrar por categoría, estado y otros criterios desde el inventario.
info.faq.point2=Los agentes acceden desde el login para gestionar anuncios, mensajes y datos de perfil.
info.faq.point3=Si necesitas ayuda adicional, utiliza la página de contacto para que soporte revise tu caso.
info.partsOrderStatus.title=Estado del pedido de piezas
info.partsOrderStatus.subtitle=Soporte de piezas
info.partsOrderStatus.lead=Esta página centraliza el seguimiento de consultas relacionadas con pedidos de piezas y su coordinación con soporte.
info.partsOrderStatus.point1=Actualmente el seguimiento se gestiona a través del equipo de soporte del marketplace.
info.partsOrderStatus.point2=Incluye en tu consulta la referencia del pedido o la información del vehículo para agilizar la revisión.
info.partsOrderStatus.point3=El portal informará aquí cuando exista una experiencia de seguimiento más detallada.
info.qualityCodes.title=Códigos de calidad
info.qualityCodes.subtitle=Referencia de calidad
info.qualityCodes.lead=Los códigos de calidad ayudan a interpretar el estado del stock anunciado y a unificar criterios de comunicación entre compradores y vendedores.
info.qualityCodes.point1=Cada concesionario debe describir el estado del vehículo o pieza con el mayor detalle posible.
info.qualityCodes.point2=Los códigos sirven como apoyo orientativo y no sustituyen la revisión comercial y documental del anuncio.
info.qualityCodes.point3=Ante cualquier duda, solicita aclaraciones al vendedor antes de continuar con la operación.
